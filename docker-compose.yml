version: '3.8'

services:
  item-monitor:
    build: .
    image: item-monitor:latest
    container_name: item-monitor
    ports:
      - "${PORT:-5188}:5188"          # Web 管理界面
    volumes:
      - ./data:/app/data     # 数据持久化（到期项/配置/用户）
    environment:
      - TZ=Asia/Shanghai     # 时区
      - PORT=5188            # Flask 监听端口
      - USE_SQLITE=1         # 使用 SQLite 存储
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5188/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
