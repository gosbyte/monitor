<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - 到期提醒管理系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.production.css') }}">
  <script src="/static/lucide.min.js" nonce="{{ csp_nonce }}"></script>
  <style nonce="{{ csp_nonce }}">
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif; }
  </style>
  <link rel="stylesheet" href="/static/dark.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
<div id="dark-toggle" onclick="toggleDarkMode(); lucide.createIcons();" class="fixed top-4 right-4 p-2 rounded-lg bg-white border border-gray-200 shadow-sm cursor-pointer hover:bg-gray-100 transition-colors z-50" title="切换暗色模式">
  <i data-lucide="sun" class="w-5 h-5 inline-block" id="dark-icon-sun"></i>
  <i data-lucide="moon" class="w-5 h-5 inline-block hidden" id="dark-icon-moon"></i>
</div>

<div class="w-full max-w-md">
  <div class="text-center mb-6">
    <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-200">
      <i data-lucide="lock" class="w-8 h-8 text-white"></i>
    </div>
    <h1 class="text-xl md:text-2xl font-bold text-gray-900">首次登录 — 修改密码</h1>
    <p class="text-sm text-gray-500 mt-1">出于安全考虑，请使用强密码替换默认密码</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 md:p-8">
    {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">{{ error }}</div>
    {% endif %}

    <form method="POST" id="change-pwd-form" class="space-y-4" onsubmit="return validateChangePassword()">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">原密码</label>
        <input type="password" name="old_password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
        <input type="password" name="new_password" required minlength="12" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="至少12位，含大小写+数字">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">确认新密码</label>
        <input type="password" name="confirm_password" required minlength="8" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-2.5 rounded-lg font-medium transition-colors">
        修改密码
      </button>
    </form>
  </div>
</div>

<script nonce="{{ csp_nonce }}">lucide.createIcons();</script>
<script src="/static/dark.js" nonce="{{ csp_nonce }}"></script>
<script nonce="{{ csp_nonce }}">
  function validateChangePassword() {
    var newPwd = document.querySelector('input[name="new_password"]').value;
    var confirmPwd = document.querySelector('input[name="confirm_password"]').value;
    var oldPwd = document.querySelector('input[name="old_password"]').value;

    if (!oldPwd) { alert('请输入原密码'); return false; }
    if (!newPwd) { alert('请输入新密码'); return false; }
    if (newPwd !== confirmPwd) { alert('两次输入的新密码不一致'); return false; }
    if (newPwd.length < 12) { alert('密码长度不能少于12位'); return false; }
    if (!/[A-Z]/.test(newPwd)) { alert('密码必须包含至少一个大写字母'); return false; }
    if (!/[a-z]/.test(newPwd)) { alert('密码必须包含至少一个小写字母'); return false; }
    if (!/[0-9]/.test(newPwd)) { alert('密码必须包含至少一个数字'); return false; }
    return true;
  }
</script>
</body>
</html>
