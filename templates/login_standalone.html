<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 到期提醒管理系统</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.production.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='dark.css') }}">
  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif; }
    body { min-height: 100vh; }
    .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
  <!-- Dark mode toggle -->
  <div id="dark-toggle" onclick="toggleDarkMode(); lucide.createIcons();" class="fixed top-4 right-4 p-2 rounded-lg bg-white border border-gray-200 shadow-sm cursor-pointer hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors z-50" title="切换暗色模式">
    <i data-lucide="sun" class="w-5 h-5 inline-block hidden dark:block"></i>
    <i data-lucide="moon" class="w-5 h-5 inline-block dark:hidden"></i>
  </div>

  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Logo 区域 -->
      <div class="text-center mb-6 md:mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200 dark:shadow-blue-900/30">
          <i data-lucide="calendar-clock" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-gray-100">到期提醒管理系统</h1>
        <p class="text-sm text-gray-500 mt-1">请登录以继续</p>
      </div>

      <!-- 登录卡片 -->
      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-6 md:p-8">
        {% if error %}
        <div class="mb-5 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-700 dark:text-red-300 flex items-center gap-2">
          <i data-lucide="alert-triangle" class="w-4 h-4 inline-block flex-shrink-0"></i>
          {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">用户名</label>
            <input type="text" name="username" required placeholder="请输入用户名"
              class="w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-gray-900 dark:text-gray-100">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">密码</label>
            <input type="password" name="password" required placeholder="请输入密码"
              class="w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-gray-900 dark:text-gray-100">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">验证码</label>
            <div class="flex gap-2 sm:gap-3 items-center">
              <input type="text" name="captcha" required placeholder="验证码" maxlength="4"
                class="flex-1 min-w-0 px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm uppercase tracking-widest text-gray-900 dark:text-gray-100">
              <img src="/captcha" onclick="this.src='/captcha?'+Math.random()"
                class="h-[42px] w-[140px] rounded-lg border border-gray-200 dark:border-gray-600 cursor-pointer hover:border-blue-300 transition-colors flex-shrink-0"
                title="点击刷新验证码" alt="验证码">
            </div>
          </div>

          <button type="submit" class="w-full py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium text-sm flex items-center justify-center gap-2">
            <i data-lucide="log-in" class="w-4 h-4 inline-block"></i> 登 录
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='lucide.min.js') }}"></script>
  <script src="{{ url_for('static', filename='dark.js') }}" nonce="{{ csp_nonce }}"></script>
  <script>
    lucide.createIcons();
    // Dark mode init
    (function() {
      var saved = localStorage.getItem('dark-mode');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'true' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
        document.body.classList.add('dark-mode');
      }
    })();
  </script>
</body>
</html>
