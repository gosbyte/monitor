<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ code }} - {{ title }}</title>
  <script src="/static/tailwind.js" nonce="{{ csp_nonce }}"></script>
  <style nonce="{{ csp_nonce }}">
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8 text-center">
    <!-- 图标 -->
    <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
      <span style="font-size:28px"><i data-lucide="alert-triangle" class="w-7 h-7 inline-block text-red-500"></i></span>
    </div>

    <!-- 错误码 -->
    <h1 class="text-5xl font-bold text-gray-900 mb-2">{{ code }}</h1>

    <!-- 标题 -->
    <h2 class="text-lg font-semibold text-gray-700 mb-3">{{ title }}</h2>

    <!-- 消息 -->
    <p class="text-sm text-gray-500 mb-6">{{ message }}</p>

    <!-- 返回按钮 -->
    <a href="/"
       class="inline-flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
      <span style="font-size:14px"><i data-lucide="arrow-left" class="w-4 h-4 inline-block"></i></span>
      返回首页
    </a>
  </div>

  <!-- 底部提示 -->
  <p class="text-center text-xs text-gray-400 mt-4">到期项到期提醒管理系统</p>
</div>

</body>
</html>
