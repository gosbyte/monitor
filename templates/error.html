<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}错误{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.production.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='dark.css') }}">
  {% block head %}{% endblock %}
  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-8 text-center">
      <div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 rounded-2xl flex items-center justify-center mx-auto mb-5">
        <i data-lucide="alert-triangle" class="w-7 h-7 text-red-500"></i>
      </div>
      <h1 class="text-5xl font-bold text-gray-900 dark:text-gray-100 mb-2">{{ code }}</h1>
      <h2 class="text-lg font-semibold text-gray-700 dark:text-gray-300 mb-3">{{ title }}</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">{{ message }}</p>
      <a href="/" class="inline-flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
        <i data-lucide="arrow-left" class="w-4 h-4 inline-block"></i> 返回首页
      </a>
    </div>
    <p class="text-center text-xs text-gray-400 mt-4">到期提醒管理系统</p>
  </div>
  <script src="{{ url_for('static', filename='lucide.min.js') }}"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
