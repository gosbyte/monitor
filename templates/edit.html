{% extends "base.html" %}

{% block title %}编辑证书{% endblock %}

{% block head %}
<style nonce="{{ csp_nonce }}">
  * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-6 space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100">编辑证书</h2>
    <a href="/" class="text-sm text-blue-600 hover:text-blue-700 dark:text-blue-400">
      <i data-lucide="arrow-left" class="w-4 h-4 inline-block"></i> 返回列表
    </a>
  </div>

  <!-- Form -->
  <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-6">
    <form method="POST" class="space-y-5">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="cert_id" value="{{ cert.id }}">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">客户名称 *</label>
          <input type="text" name="customer" required value="{{ cert.customer }}"
            class="w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-gray-900 dark:text-gray-100">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">域名</label>
          <input type="text" name="domain" value="{{ cert.domain or '' }}"
            class="w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-gray-900 dark:text-gray-100">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">证书类型</label>
        <input type="text" name="cert_type" value="{{ cert.cert_type or '' }}"
          class="w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-gray-900 dark:text-gray-100">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">到期时间 *</label>
          <input type="datetime-local" name="expire_date" required value="{{ cert.expire_date }}"
            class="w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-gray-900 dark:text-gray-100">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">负责人</label>
          <select name="responsible_users" multiple
            class="w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-gray-900 dark:text-gray-100">
            {% for u in users %}
            <option value="{{ u.username }}" {% if u.username in (cert.responsible_users or []) %}selected{% endif %}>{{ u.name or u.username }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">备注</label>
        <textarea name="note" rows="3"
          class="w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-gray-900 dark:text-gray-100">{{ cert.note or '' }}</textarea>
      </div>

      <div class="flex items-center gap-6">
        <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
          <input type="checkbox" name="remind_enabled" value="on" {% if cert.remind_enabled %}checked{% endif %}
            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
          启用提醒
        </label>
        <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
          <input type="checkbox" name="handled" value="on" {% if cert.handled %}checked{% endif %}
            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
          已处理
        </label>
      </div>

      <div class="flex gap-3 pt-4">
        <button type="submit" class="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium">
          保存修改
        </button>
        <a href="/" class="px-6 py-2.5 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-sm">
          取消
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
