<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>到期提醒管理系统 - 登录</title>
  <script src="/static/tailwind.js"></script>
    <style nonce="{{ csp_nonce }}">
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif; }
  </style>
  <link rel="stylesheet" href="/static/dark.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
<div id="dark-toggle" onclick="toggleDarkMode(); lucide.createIcons();" class="fixed top-4 right-4 p-2 rounded-lg bg-white border border-gray-200 shadow-sm cursor-pointer hover:bg-gray-100 transition-colors z-50" title="切换暗色模式">
  <i data-lucide="sun" class="w-5 h-5 inline-block dark:hidden"></i>
  <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
</div>

<div class="w-full max-w-md">
  <!-- Logo 区域 -->
  <div class="text-center mb-6 md:mb-8">
    <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
      <span style="font-size:14px"><i data-lucide="calendar-clock" class="w-4 h-4 inline-block"></i></span>
    </div>
    <h1 class="text-xl md:text-2xl font-bold text-gray-900">到期提醒管理系统</h1>
    <p class="text-sm text-gray-500 mt-1">请登录以继续</p>
  </div>

  <!-- 登录卡片 -->
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 md:p-8">
    {% if error %}
    <div class="mb-5 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 flex items-center gap-2">
      <span style="font-size:14px"><i data-lucide="alert-triangle" class="w-4 h-4 inline-block"></i></span>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-5">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名</label>
        <input type="text" name="username" required placeholder="请输入用户名"
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
        <input type="password" name="password" required placeholder="请输入密码"
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">验证码</label>
        <div class="flex gap-2 sm:gap-3 items-center">
          <input type="text" name="captcha" required placeholder="验证码" maxlength="4"
            class="flex-1 min-w-0 px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm uppercase tracking-widest">
          <img src="/captcha" onclick="this.src='/captcha?'+Math.random()"
            class="h-[42px] w-[140px] rounded-lg border border-gray-200 cursor-pointer hover:border-blue-300 transition-colors flex-shrink-0"
            title="点击刷新验证码" alt="验证码">
        </div>
      </div>

      <button type="submit" class="w-full py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium text-sm flex items-center justify-center gap-2">
        <span style="font-size:14px"><i data-lucide="log-in" class="w-4 h-4 inline-block"></i></span> 登 录
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-gray-400 mt-6">到期提醒管理系统</p>
</div>

<script nonce="{{ csp_nonce }}">document.addEventListener('DOMContentLoaded', function() { lucide.createIcons(); });</script>
<script src="/static/dark.js"></script></body>
</html>
