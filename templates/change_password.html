<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}修改密码{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.production.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='dark.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">
  <!-- Dark mode toggle -->
  <div id="dark-toggle" onclick="toggleDarkMode(); lucide.createIcons();" class="fixed top-4 right-4 p-2 rounded-lg bg-white border border-gray-200 shadow-sm cursor-pointer hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-600 dark:hover:bg-gray-700 transition-colors z-50" title="切换暗色模式">
    <i data-lucide="sun" class="w-5 h-5 inline-block hidden dark:block"></i>
    <i data-lucide="moon" class="w-5 h-5 inline-block dark:hidden"></i>
  </div>

  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-6 md:mb-8">
        <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-200 dark:shadow-orange-900/30">
          <i data-lucide="lock" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-gray-100">首次登录 — 修改密码</h1>
        <p class="text-sm text-gray-500 mt-1">出于安全考虑，请使用强密码替换默认密码</p>
      </div>

      <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-6 md:p-8">
        {% if error %}
        <div class="mb-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-700 dark:text-red-300">{{ error }}</div>
        {% endif %}

        <form method="POST" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">原密码</label>
            <input type="password" name="old_password" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-sm text-gray-900 dark:text-gray-100">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">新密码</label>
            <input type="password" name="new_password" required minlength="8" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-sm text-gray-900 dark:text-gray-100" placeholder="至少8位，含大小写+数字">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">确认新密码</label>
            <input type="password" name="confirm_password" required minlength="8" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-sm text-gray-900 dark:text-gray-100">
          </div>
          <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-2.5 rounded-lg font-medium transition-colors text-sm">
            修改密码
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='lucide.min.js') }}"></script>
  <script src="{{ url_for('static', filename='dark.js') }}" nonce="{{ csp_nonce }}"></script>
  <script>
    lucide.createIcons();
    (function() {
      try {
        var s = localStorage.getItem('dark-mode');
        if (s === 'true' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
          document.body.classList.add('dark-mode');
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
