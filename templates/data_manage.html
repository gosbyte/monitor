<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据管理</title>
  <script src="/static/tailwind.js" nonce="{{ csp_nonce }}"></script>
  <style nonce="{{ csp_nonce }}"> * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif; } </style>
  <link rel="stylesheet" href="/static/dark.css">
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-white border-b border-gray-200 sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-4 py-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-2 text-gray-500 hover:text-gray-700 transition-colors text-sm">
          <span style="font-size:14px"><i data-lucide="arrow-left" class="w-4 h-4 inline-block"></i></span> 返回
        </a>
        <span class="text-gray-300">|</span>
        <h1 class="text-lg font-semibold text-gray-900">数据管理</h1>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleDarkMode()" class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 inline-block" id="dark-icon-sun"></i>
          <i data-lucide="moon" class="w-4 h-4 inline-block hidden" id="dark-icon-moon"></i>
          <span id="dark-label">暗色模式</span>
        </button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-8 space-y-6">

  <!-- Tab 切换 -->
  <div class="flex border-b border-gray-200">
    <button onclick="switchTab('import')" id="tab-import" class="px-6 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600 -mb-px">
      <i data-lucide="upload" class="w-4 h-4 inline-block mr-2"></i>批量导入
    </button>
    <button onclick="switchTab('export')" id="tab-export" class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 -mb-px">
      <i data-lucide="file-spreadsheet" class="w-4 h-4 inline-block mr-2"></i>导出 Excel
    </button>
    <button onclick="switchTab('json')" id="tab-json" class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 -mb-px">
      <i data-lucide="file-json" class="w-4 h-4 inline-block mr-2"></i>导出 JSON
    </button>
  </div>

  <!-- ── 导入面板 ── -->
  <div id="panel-import" class="space-y-6">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
      <h2 class="text-base font-semibold text-gray-900 mb-4 flex items-center gap-2">
        <span style="font-size:14px"><i data-lucide="file-spreadsheet" class="w-4 h-4 inline-block"></i></span> Excel 导入
      </h2>

      <!-- 结果提示 -->
      <div id="result-area" class="hidden p-3 rounded-lg text-sm mb-4"></div>

      <!-- 上传区域 -->
      <div id="upload-area">
        <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-400 transition-colors cursor-pointer" onclick="document.getElementById('excel-file').click()">
          <i data-lucide="upload-cloud" class="w-10 h-10 inline-block text-gray-400 mb-3"></i>
          <p class="text-gray-600 text-sm mb-1">点击或拖拽上传 Excel 文件（.xlsx）</p>
          <p class="text-gray-400 text-xs">支持 .xlsx 格式，必填字段：客户名称、到期日期</p>
          <input type="file" id="excel-file" accept=".xlsx" class="hidden" onchange="onFileSelected(event)">
        </div>
        <div class="flex gap-3 mt-4">
          <a href="/import/template" class="inline-flex items-center gap-2 px-4 py-2.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors text-sm">
            <i data-lucide="download" class="w-4 h-4 inline-block"></i> 下载模板
          </a>
        </div>
      </div>

      <!-- 预览区域 -->
      <div id="preview-area" class="hidden mt-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-medium text-gray-700">数据预览（前5条）</h3>
          <span id="preview-info" class="text-xs text-gray-400"></span>
        </div>
        <div class="overflow-x-auto border border-gray-200 rounded-lg">
          <table class="w-full text-sm" id="preview-table">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-3 py-2 text-left font-medium text-gray-600">客户名称</th>
                <th class="px-3 py-2 text-left font-medium text-gray-600">提醒类型</th>
                <th class="px-3 py-2 text-left font-medium text-gray-600">域名</th>
                <th class="px-3 py-2 text-left font-medium text-gray-600">到期日期</th>
                <th class="px-3 py-2 text-left font-medium text-gray-600">备注</th>
              </tr>
            </thead>
            <tbody id="preview-tbody" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
        <div class="flex gap-3 mt-4">
          <button onclick="doImport()" id="import-btn" class="inline-flex items-center gap-2 px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium">
            <i data-lucide="check" class="w-4 h-4 inline-block"></i> 确认导入
          </button>
          <button onclick="cancelImport()" class="inline-flex items-center gap-2 px-4 py-2.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors text-sm">
            取消
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 导出 Excel 面板 ── -->
  <div id="panel-export" class="hidden space-y-6">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8 text-center">
      <i data-lucide="file-spreadsheet" class="w-16 h-16 inline-block text-green-500 mb-4"></i>
      <h2 class="text-lg font-semibold text-gray-900 mb-2">导出 Excel 文件</h2>
      <p class="text-gray-500 text-sm mb-6 max-w-md mx-auto">将所有记录导出为 .xlsx 格式的 Excel 表格，包含所有字段信息。</p>
      <a href="/export/excel" class="inline-flex items-center gap-2 px-8 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 transition-colors text-sm font-semibold shadow-md hover:shadow-lg">
        <i data-lucide="download" class="w-5 h-5"></i>
        下载 Excel 文件
      </a>
    </div>
  </div>

  <!-- ── 导出 JSON 面板 ── -->
  <div id="panel-json" class="hidden space-y-6">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8 text-center">
      <i data-lucide="file-json" class="w-16 h-16 inline-block text-amber-500 mb-4"></i>
      <h2 class="text-lg font-semibold text-gray-900 mb-2">导出 JSON 数据</h2>
      <p class="text-gray-500 text-sm mb-6 max-w-md mx-auto">将所有记录导出为 .json 格式文件，适合备份和迁移使用。</p>
      <a href="/export/json" class="inline-flex items-center gap-2 px-8 py-3 bg-amber-500 text-white rounded-xl hover:bg-amber-600 transition-colors text-sm font-semibold shadow-md hover:shadow-lg">
        <i data-lucide="download" class="w-5 h-5"></i>
        下载 JSON 文件
      </a>
    </div>
  </div>

</main>

<script src="{{ url_for('static', filename='lucide.min.js') }}"></script>
<script nonce="{{ csp_nonce }}">
let _csrfToken = "{{ csrf_token() }}";
let previewData = null;

function switchTab(tab) {
  // 隐藏所有面板
  document.getElementById('panel-import').classList.add('hidden');
  document.getElementById('panel-export').classList.add('hidden');
  document.getElementById('panel-json').classList.add('hidden');
  // 重置 tab 样式
  ['import', 'export', 'json'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    el.classList.remove('border-blue-600', 'text-blue-600');
    el.classList.add('border-transparent', 'text-gray-500');
  });
  // 显示目标面板
  document.getElementById('panel-' + tab).classList.remove('hidden');
  const activeTab = document.getElementById('tab-' + tab);
  activeTab.classList.remove('border-transparent', 'text-gray-500');
  activeTab.classList.add('border-blue-600', 'text-blue-600');
}

function showResult(ok, msg) {
  const area = document.getElementById('result-area');
  area.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'border-green-200', 'bg-red-50', 'text-red-700', 'border-red-200');
  if (ok) {
    area.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
    area.innerHTML = '<span style="font-size:14px"><i data-lucide="check-circle-2" class="w-4 h-4 inline-block text-green-600 mr-1"></i></span> ' + msg;
  } else {
    area.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
    area.innerHTML = '<span style="font-size:14px"><i data-lucide="x-circle" class="w-4 h-4 inline-block text-red-600 mr-1"></i></span> ' + msg;
  }
  lucide.createIcons();
}

function onFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.name.endsWith('.xlsx')) {
    showResult(false, '请选择 .xlsx 格式的文件');
    return;
  }

  const formData = new FormData();
  formData.append('file', file);
  formData.append('_csrf_token', _csrfToken);

  showResult(true, '正在解析文件...');

  fetch('/api/preview_import', {
    method: 'POST',
    headers: { 'X-CSRF-Token': _csrfToken },
    body: formData
  })
  .then(r => r.json())
  .then(data => {
    if (data.csrf_token) _csrfToken = data.csrf_token;
    if (!data.ok) {
      showResult(false, data.message || '文件解析失败');
      return;
    }
    previewData = data.data;
    document.getElementById('upload-area').classList.add('hidden');
    document.getElementById('result-area').classList.add('hidden');
    document.getElementById('preview-area').classList.remove('hidden');
    document.getElementById('preview-info').textContent = `共 ${data.total} 条记录`;
    const tbody = document.getElementById('preview-tbody');
    tbody.innerHTML = '';
    data.data.slice(0, 5).forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="px-3 py-2">${row.customer || '-'}</td><td class="px-3 py-2">${row.cert_type || '-'}</td><td class="px-3 py-2">${row.domain || '-'}</td><td class="px-3 py-2">${row.expiry_date || '-'}</td><td class="px-3 py-2">${row.note || '-'}</td>`;
      tbody.appendChild(tr);
    });
  })
  .catch(err => showResult(false, '网络错误：' + err.message));
}

function doImport() {
  if (!previewData) return;
  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg class="animate-spin w-4 h-4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" opacity=".25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" fill="none"/></svg> 导入中...';

  fetch('/api/import_excel', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrfToken },
    body: JSON.stringify({ data: previewData, _csrf_token: _csrfToken })
  })
  .then(r => r.json())
  .then(result => {
    if (result.csrf_token) _csrfToken = result.csrf_token;
    showResult(result.ok, result.message || (result.ok ? '导入成功！' : '导入失败'));
    if (result.ok) {
      setTimeout(() => { window.location.href = '/'; }, 1500);
    } else {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 inline-block"></i> 确认导入';
      lucide.createIcons();
    }
  })
  .catch(err => {
    showResult(false, '网络错误：' + err.message);
    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 inline-block"></i> 确认导入';
    lucide.createIcons();
  });
}

function cancelImport() {
  previewData = null;
  document.getElementById('preview-area').classList.add('hidden');
  document.getElementById('upload-area').classList.remove('hidden');
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('excel-file').value = '';
}
</script>
<script nonce="{{ csp_nonce }}">document.addEventListener("DOMContentLoaded", function() { lucide.createIcons(); });</script>
<script src="/static/dark.js" nonce="{{ csp_nonce }}"></script></body>
</html>
