[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:web]
command=python app.py
directory=/app
stdout_logfile=/var/log/supervisor/web.log
stderr_logfile=/var/log/supervisor/web_error.log
autostart=true
autorestart=true
startretries=3
priority=100
environment=PORT="5188"

[program:daemon]
command=python daemon.py
directory=/app
stdout_logfile=/var/log/supervisor/daemon.log
stderr_logfile=/var/log/supervisor/daemon_error.log
autostart=true
autorestart=true
startretries=3
priority=200
